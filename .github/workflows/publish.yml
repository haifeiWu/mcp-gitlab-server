name: Publish Package to npm

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  release:
    types: [created]

permissions:
  contents: read

jobs:
  build-and-test:
    # Skip if the commit message contains "update changelog [skip ci]"
    if: ${{ !contains(github.event.head_commit.message, 'update changelog [skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish-npm:
    # Only publish on push to main or release events; skip on PRs and on
    # changelog-only auto-commits.
    if: >-
      github.event_name != 'pull_request' &&
      !contains(github.event.head_commit.message, 'update changelog [skip ci]')
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@yoda.digital/gitlab-mcp-server
    permissions:
      contents: read
      # id-token: write is required for both:
      #   1. npm OIDC trusted publishing (no NPM_TOKEN needed)
      #   2. Sigstore-signed provenance attestations
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org/"
          scope: "@yoda.digital"
      - run: npm ci
      - run: npm run build
      # No NODE_AUTH_TOKEN. Authentication is via npm Trusted Publishing —
      # configure on npmjs.com:
      #   Package settings → Publishing access → Trusted publisher
      #   Publisher: GitHub Actions
      #   Organization: yoda-digital
      #   Repository: mcp-gitlab-server
      #   Workflow filename: .github/workflows/publish.yml
      #   Environment name: npm-publish
      # Reference: https://docs.npmjs.com/trusted-publishers
      - run: npm publish --provenance --access public
